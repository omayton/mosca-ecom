<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f4f4f5"/>

  <!-- Mosca cinza estilizada -->
  <g transform="translate(200, 180)">
    <!-- Sombra -->
    <ellipse cx="0" cy="65" rx="30" ry="6" fill="#d4d4d8" opacity="0.5"/>

    <!-- Asa esquerda -->
    <ellipse cx="-35" cy="-15" rx="28" ry="16" fill="#e4e4e7" stroke="#d4d4d8" stroke-width="1.5" transform="rotate(-15 -35 -15)"/>
    <ellipse cx="-30" cy="-10" rx="18" ry="10" fill="none" stroke="#d4d4d8" stroke-width="0.8" transform="rotate(-15 -30 -10)"/>

    <!-- Asa direita -->
    <ellipse cx="35" cy="-15" rx="28" ry="16" fill="#e4e4e7" stroke="#d4d4d8" stroke-width="1.5" transform="rotate(15 35 -15)"/>
    <ellipse cx="30" cy="-10" rx="18" ry="10" fill="none" stroke="#d4d4d8" stroke-width="0.8" transform="rotate(15 30 -10)"/>

    <!-- Corpo -->
    <ellipse cx="0" cy="20" rx="18" ry="28" fill="#a1a1aa" stroke="#71717a" stroke-width="1"/>
    <!-- Listras do corpo -->
    <ellipse cx="0" cy="12" rx="11" ry="4" fill="#71717a" opacity="0.3"/>
    <ellipse cx="0" cy="22" rx="10" ry="3.5" fill="#71717a" opacity="0.3"/>
    <ellipse cx="0" cy="32" rx="8" ry="3" fill="#71717a" opacity="0.3"/>

    <!-- Cabeça -->
    <circle cx="0" cy="-12" r="14" fill="#a1a1aa" stroke="#71717a" stroke-width="1"/>

    <!-- Olhos -->
    <circle cx="-6" cy="-15" r="5" fill="#71717a"/>
    <circle cx="6" cy="-15" r="5" fill="#71717a"/>
    <!-- Brilho olhos -->
    <circle cx="-4.5" cy="-16.5" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="7.5" cy="-16.5" r="1.5" fill="white" opacity="0.5"/>

    <!-- Patas (simplificadas) -->
    <line x1="-12" y1="15" x2="-22" y2="25" stroke="#71717a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-14" y1="25" x2="-24" y2="38" stroke="#71717a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-13" y1="35" x2="-22" y2="48" stroke="#71717a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="12" y1="15" x2="22" y2="25" stroke="#71717a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="14" y1="25" x2="24" y2="38" stroke="#71717a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="13" y1="35" x2="22" y2="48" stroke="#71717a" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <text x="200" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#a1a1aa">Mosca Branca Parts</text>
  <text x="200" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d4d4d8">Imagem em breve</text>
</svg>
