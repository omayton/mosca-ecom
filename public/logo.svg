<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <!-- Fly icon -->
  <g transform="translate(4, 8)">
    <!-- Wings -->
    <ellipse cx="16" cy="12" rx="10" ry="6" fill="#dc2626" opacity="0.25"/>
    <ellipse cx="30" cy="12" rx="10" ry="6" fill="#dc2626" opacity="0.25"/>
    <!-- Body -->
    <ellipse cx="23" cy="20" rx="6" ry="9" fill="#18181b"/>
    <!-- Head -->
    <circle cx="23" cy="10" r="5" fill="#18181b"/>
    <!-- Eyes -->
    <circle cx="21" cy="9" r="1.8" fill="#dc2626"/>
    <circle cx="25" cy="9" r="1.8" fill="#dc2626"/>
    <circle cx="21.6" cy="8.4" r="0.6" fill="white" opacity="0.7"/>
    <circle cx="25.6" cy="8.4" r="0.6" fill="white" opacity="0.7"/>
    <!-- Body stripe -->
    <ellipse cx="23" cy="18" rx="4" ry="1.5" fill="#2a2a2a" opacity="0.6"/>
    <ellipse cx="23" cy="22" rx="3.5" ry="1.2" fill="#2a2a2a" opacity="0.6"/>
  </g>

  <!-- MOSCA -->
  <text x="48" y="28" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="22" fill="#18181b" letter-spacing="-0.5">MOSCA</text>

  <!-- BRANCA -->
  <text x="48" y="46" font-family="'Arial', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="13" fill="#dc2626" letter-spacing="3">BRANCA</text>

  <!-- PARTS tag -->
  <rect x="148" y="35" width="52" height="14" rx="3" fill="#dc2626"/>
  <text x="174" y="46" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="white" text-anchor="middle" letter-spacing="1.5">PARTS</text>
</svg>
